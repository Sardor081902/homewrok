<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>list</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>

<body>
    <div class="box">
        <div class="text">
            <div>
                <p class="text1"></p>
                <button class="bt1" onclick="document.getElementById('input1').focus()
                 document.getElementById('icon1');if(icon1.id.includes('act')){icon1.id = 'icon1';} else {
                    icon1.id = 'icon1act'}">
                    <i id="icon1" class="fa-solid fa-pen-to-square"></i>
                </button>
            </div>
            <div>
                <p class="text2"></p>
                <button class="bt1" onclick="document.getElementById('input2').focus()
                document.getElementById('icon2');if(icon2.id.includes('act')){icon2.id = 'icon2';} else {
                    icon2.id = 'icon2act'}">
                    <i id="icon2" class="fa-solid fa-pen-to-square"></i>
                </button>
            </div>
            <div>
                <p class="text3"></p>
                <button class="bt1" onclick="document.getElementById('input3').focus();
                let icon3 = document.getElementById('icon3');if(icon3.id.includes('act')){icon3.id = 'icon3';} else {
                    icon3.id = 'icon3act'}">
                    <i id="icon3" class="fa-solid fa-pen-to-square"></i>
                </button>
            <div>
        </div>
    </div>
    <input type="text" id="input1">
    <input type="text" id="input2">
    <input type="text" id="input3">
    <script src="app.js"></script>
</body>

</html>
